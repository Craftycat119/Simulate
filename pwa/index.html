<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#161b26">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Симулятор Жизни">
<title>Симулятор Жизни</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===================== ЭКРАН СОЗДАНИЯ ПЕРСОНАЖА ===================== -->
<div id="screen-create" class="screen">
  <div class="create-wrap">
    <h1 class="create-title">Симулятор Жизни</h1>
    <p class="create-sub">Выживи и разбогатей</p>

    <div id="create-step-name" class="create-step">
      <label class="field-label">Как зовут вашего персонажа?</label>
      <input id="name-input" class="text-input" type="text" maxlength="40" placeholder="Введите имя" autocomplete="off">
      <button id="btn-name-next" class="btn btn-accent btn-block">Далее</button>
    </div>

    <div id="create-step-avatar" class="create-step hidden">
      <div class="avatar-editor">
        <canvas id="avatar-preview" width="180" height="210"></canvas>
        <div class="avatar-controls" id="avatar-controls"></div>
      </div>
      <button id="btn-start-game" class="btn btn-accent btn-block">Начать игру</button>
    </div>
  </div>
</div>

<!-- ===================== ЭКРАН ЗАГРУЗКИ / СТАРТА ===================== -->
<div id="screen-launch" class="screen hidden">
  <div class="create-wrap">
    <h1 class="create-title">Симулятор Жизни</h1>
    <p class="create-sub">Выживи и разбогатей</p>
    <div id="launch-continue-box"></div>
    <button id="btn-new-game" class="btn btn-accent btn-block">Новая игра</button>
  </div>
</div>

<!-- ===================== ИГРОВОЙ ЭКРАН ===================== -->
<div id="screen-game" class="screen hidden">
  <header id="topbar">
    <div id="topbar-left">
      <div id="topbar-name"></div>
      <div id="topbar-date"></div>
    </div>
    <div id="topbar-money"></div>
    <div id="topbar-right">
      <button id="btn-pause" class="icon-btn">▶</button>
      <select id="speed-select" class="speed-select">
        <option value="1">x1</option><option value="2">x2</option><option value="4">x4</option>
        <option value="8">x8</option><option value="16">x16</option><option value="32">x32</option>
      </select>
      <button id="btn-menu" class="icon-btn">⋮</button>
    </div>
  </header>

  <main id="content"></main>

  <nav id="bottombar">
    <button class="tab-btn active" data-tab="home"><span class="tab-icon">🏠</span><span>Главное</span></button>
    <button class="tab-btn" data-tab="status"><span class="tab-icon">❤</span><span>Состояние</span></button>
    <button class="tab-btn" data-tab="employment"><span class="tab-icon">💼</span><span>Занятость</span></button>
    <button class="tab-btn" data-tab="family"><span class="tab-icon">👪</span><span>Семья</span></button>
    <button class="tab-btn" data-tab="special"><span class="tab-icon">📈</span><span>Спец.</span></button>
    <button class="tab-btn" data-tab="property"><span class="tab-icon">🚗</span><span>Собств.</span></button>
    <button class="tab-btn" data-tab="log"><span class="tab-icon">📜</span><span>Журнал</span></button>
  </nav>
</div>

<!-- ===================== ТОСТЫ / МОДАЛКИ ===================== -->
<div id="toast-container"></div>
<div id="modal-root"></div>

<script src="js/gamedata.js"></script>
<script src="js/avatar.js"></script>
<script src="js/engine.js"></script>
<script src="js/achievements.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
